<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Query Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0d0f;
    --surface:   #111316;
    --border:    #1e2126;
    --border-hi: #2e333b;
    --accent:    #00e5a0;
    --accent-dim:#00e5a022;
    --accent2:   #5b8eff;
    --text:      #e8eaed;
    --muted:     #6b7280;
    --sql-bg:    #0d1117;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeDown 0.6s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    padding: 5px 12px;
    border-radius: 2px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 1rem;
    font-weight: 400;
  }

  .card {
    width: 100%;
    max-width: 820px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: #0e1013;
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }

  .card-label {
    margin-left: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .input-area {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    line-height: 1.65;
    resize: none;
    min-height: 80px;
  }

  textarea::placeholder { color: var(--muted); }

  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: #0e1013;
  }

  .hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  kbd {
    background: var(--border-hi);
    border: 1px solid #3a3f47;
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 10px;
    color: var(--text);
  }

  button {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 22px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity 0.15s, transform 0.1s;
  }

  button:hover  { opacity: 0.88; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .arrow { width: 14px; height: 14px; transition: transform 0.2s; }
  button:not(:disabled):hover .arrow { transform: translateX(3px); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid #00000040;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .loading .spinner { display: block; }
  .loading .arrow   { display: none; }

  .result-panel { display: none; flex-direction: column; animation: fadeUp 0.35s ease both; }
  .result-panel.visible { display: flex; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: #0e1013;
  }

  .result-meta { display: flex; align-items: center; gap: 12px; }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
  }

  .tag-sql {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .tables-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }
  .tables-label span { color: var(--accent2); }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border-hi);
    color: var(--muted);
    font-size: 11px;
    padding: 6px 12px;
    letter-spacing: 0.05em;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }

  pre {
    margin: 0;
    padding: 28px;
    background: var(--sql-bg);
    overflow-x: auto;
    border-top: 1px solid var(--border);
  }

  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.875rem;
    line-height: 1.8;
    color: #e8eaed;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .kw  { color: #ff7b72; font-weight: 500; }
  .fn  { color: #d2a8ff; }
  .str { color: #a5d6ff; }
  .num { color: #f2cc60; }
  .cmt { color: #6b7280; font-style: italic; }

  .error-box {
    display: none;
    padding: 20px 24px;
    background: #1a0d0d;
    border-top: 1px solid #3b1515;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #ff7b72;
    line-height: 1.6;
  }
  .error-box.visible { display: block; }

  .history { width: 100%; max-width: 820px; margin-top: 32px; animation: fadeUp 0.6s ease 0.2s both; }

  .history-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .history-item {
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .history-item:hover { border-color: var(--border-hi); }

  .history-q {
    font-size: 0.9rem;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px) } to { opacity:1; transform:none } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(16px)  } to { opacity:1; transform:none } }
  @keyframes spin     { to   { transform: rotate(360deg) } }
  @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="badge"><span class="badge-dot"></span>AI-Powered</div>
    <h1>Natural Language<br>to <span>SQL</span></h1>
    <p class="subtitle">Describe what you need — get production-ready SQL instantly</p>
  </header>

  <div class="card">
    <div class="card-header">
      <span class="dot dot-r"></span>
      <span class="dot dot-y"></span>
      <span class="dot dot-g"></span>
      <span class="card-label">query_builder.sql</span>
    </div>

    <div class="input-area">
      <textarea id="prompt" rows="3"
        placeholder="e.g. Show all customers with overdue invoices in the last 30 days..."
        autofocus></textarea>
    </div>

    <div class="input-footer">
      <span class="hint"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> to run</span>
      <button id="run-btn">
        <span>Generate SQL</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        <div class="spinner"></div>
      </button>
    </div>

    <div class="result-panel" id="result-panel">
      <div class="result-header">
        <div class="result-meta">
          <span class="tag tag-sql">SQL</span>
          <span class="tables-label" id="tables-label"></span>
        </div>
        <button class="copy-btn" id="copy-btn">Copy</button>
      </div>
      <pre><code id="sql-output"></code></pre>
    </div>

    <div class="error-box" id="error-box"></div>
  </div>

  <div class="history" id="history-section" style="display:none">
    <div class="history-title">Recent Queries</div>
    <div id="history-list"></div>
  </div>

</div>
<script>
  var queryHistory = [];

  function runQuery() {
    var promptText = document.getElementById('prompt').value.trim();
    if (!promptText) return;

    var btn         = document.getElementById('run-btn');
    var resultPanel = document.getElementById('result-panel');
    var errorBox    = document.getElementById('error-box');

    btn.disabled = true;
    btn.classList.add('loading');
    resultPanel.classList.remove('visible');
    errorBox.classList.remove('visible');
    errorBox.textContent = '';

    fetch('/query', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ query: promptText })
    })
    .then(function(res) {
      return res.json().then(function(data) {
        if (!res.ok || data.error) {
          throw new Error(data.error || ('Server error ' + res.status));
        }
        return data;
      });
    })
    .then(function(data) {
      document.getElementById('sql-output').innerHTML = highlight(data.sql);

      var tablesLabel = document.getElementById('tables-label');
      if (data.matched_tables && data.matched_tables.length) {
        tablesLabel.innerHTML = 'Tables: ' + data.matched_tables
          .map(function(t) { return '<span>' + escHtml(t) + '</span>'; })
          .join(', ');
      } else {
        tablesLabel.innerHTML = '';
      }

      resultPanel.classList.add('visible');
      addToHistory(promptText, data.sql);
    })
    .catch(function(err) {
      errorBox.textContent = 'Error: ' + err.message;
      errorBox.classList.add('visible');
    })
    .finally(function() {
      btn.disabled = false;
      btn.classList.remove('loading');
    });
  }

  function highlight(sql) {
    var keywords = [
      'SELECT','FROM','WHERE','JOIN','LEFT','RIGHT','INNER','OUTER','FULL','CROSS',
      'ON','AND','OR','NOT','IN','EXISTS','BETWEEN','LIKE','IS','NULL','AS',
      'GROUP BY','ORDER BY','HAVING','LIMIT','OFFSET','UNION','ALL','DISTINCT',
      'INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','DROP',
      'ALTER','INDEX','WITH','CASE','WHEN','THEN','ELSE','END','COALESCE',
      'COUNT','SUM','AVG','MIN','MAX','TOP','ROWNUM'
    ];

    var out = sql
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;');

    // Comments: match -- through end of line
    out = out.replace(/--[^\n]*/g, function(m) {
      return '<span class="cmt">' + m + '</span>';
    });

    // Single-quoted strings
    out = out.replace(/'[^']*'/g, function(m) {
      return '<span class="str">' + m + '</span>';
    });

    // Numbers
    out = out.replace(/\b\d+(\.\d+)?\b/g, function(m) {
      return '<span class="num">' + m + '</span>';
    });

    // Keywords
    keywords.forEach(function(kw) {
      var re = new RegExp('\\b' + kw + '\\b', 'gi');
      out = out.replace(re, function(m) {
        return '<span class="kw">' + m + '</span>';
      });
    });

    return out;
  }

  function copySQL() {
    var raw = document.getElementById('sql-output').textContent;
    navigator.clipboard.writeText(raw).then(function() {
      var btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 1800);
    });
  }

  function addToHistory(query, sql) {
    var now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    queryHistory.unshift({ query: query, sql: sql, time: now });

    var section = document.getElementById('history-section');
    var list    = document.getElementById('history-list');
    section.style.display = 'block';

    var recent = queryHistory.slice(0, 8);
    list.innerHTML = recent.map(function(h, i) {
      return '<div class="history-item" data-index="' + i + '">' +
               '<span class="history-q">' + escHtml(h.query) + '</span>' +
               '<span class="history-time">' + h.time + '</span>' +
             '</div>';
    }).join('');

    list.onclick = function(e) {
      var item = e.target.closest('.history-item');
      if (item) { loadHistory(parseInt(item.getAttribute('data-index'), 10)); }
    };
  }

  function loadHistory(i) {
    document.getElementById('prompt').value = queryHistory[i].query;
    document.getElementById('sql-output').innerHTML = highlight(queryHistory[i].sql);
    document.getElementById('result-panel').classList.add('visible');
  }

  function escHtml(s) {
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  document.getElementById('run-btn').addEventListener('click', runQuery);
  document.getElementById('copy-btn').addEventListener('click', copySQL);
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { runQuery(); }
  });
</script>
</body>
</html>
